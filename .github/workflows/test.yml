name: Run API tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: npx newman run postman/metacritic_game_api.postman_collection.json -e postman/production.postman_environment.json