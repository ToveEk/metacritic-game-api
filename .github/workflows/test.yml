name: Postman Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: "test"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: railway
      DB_USER: root
      DB_PASSWORD: testpassword
      METACRITIC_CSV_PATH: ./data/metacritic.csv
      BASE_URL: http://localhost:3000
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: railway
        options: >-
          --health-cmd="mysqladmin ping -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create JWT keys
      run: |
        mkdir -p keys
        echo "${{ secrets.JWT_PRIVATE_KEY }}" > keys/private.pem
        echo "${{ secrets.JWT_PUBLIC_KEY }}" > keys/public.pem

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Newman
      run: npm install -g newman
    
    - name: Start server
      run: node src/server.js &
    
    - name: Wait for server to be ready
      run: |
        for i in {1..30}; do
          if curl -f http://localhost:3000 2>/dev/null; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 1
        done
        echo "Server did not respond in time"
        exit 1
    
    - name: Run Postman tests
      run: |
        newman run postman/metacritic_game_api.postman_collection.json \
          --environment <(echo '{"id":"test-env","values":[{"key":"BASE_URL","value":"http://localhost:3000"}]}') \
          --reporters cli,json