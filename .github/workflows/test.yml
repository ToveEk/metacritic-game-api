name: Postman Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    env:
      METACRITIC_CSV_PATH: ${{ secrets.METACRITIC_CSV_PATH }}
      BASE_URL: ${{ secrets.BASE_URL }}
      NODE_ENV: "test"
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create JWT keys
      run: |
        echo "${{ secrets.JWT_PRIVATE_KEY }}" > keys/private.pem
        echo "${{ secrets.JWT_PUBLIC_KEY }}" > keys/public.pem
        mkdir -p keys

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Newman
      run: npm install -g newman
    
    - name: Start server
      run: node src/server.js
    
    - name: Wait for server to be ready
      run: |
        for i in {1..30}; do
          if curl -f ${{ secrets.BASE_URL }} 2>/dev/null; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 1
        done
        echo "Server did not respond in time"
        exit 1
    
    - name: Run Postman tests
      run: |
        newman run postman/metacritic_game_api.postman_collection.json \
          --environment <(echo '{"id":"test-env","values":[{"key":"BASE_URL","value": "'${{ secrets.BASE_URL }}'"}]}') \
          --reporters cli,json \
          --reporter-json-export test-results.json \
          --bail
    
    - name: Parse and display test results
      if: always()
      run: |
        if [ -f test-results.json ]; then
          echo "=== Test Summary ===" 
          cat test-results.json | jq '.run | {tests: .stats.tests, passes: .stats.tests.total - .failures.length, failures: .failures.length}'
        fi
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postman-test-results
        path: test-results.json
